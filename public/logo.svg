<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="heartShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#059669" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Heart shape -->
  <path filter="url(#heartShadow)"
        fill="url(#heartGrad)"
        d="M60 102
           C 58 100, 18 76, 14 48
           C 10 24, 30 10, 46 18
           C 53 21, 58 27, 60 32
           C 62 27, 67 21, 74 18
           C 90 10, 110 24, 106 48
           C 102 76, 62 100, 60 102 Z"/>

  <!-- QR-like pattern in white inside the heart -->
  <g fill="#ffffff">
    <!-- Top-left finder -->
    <rect x="36" y="34" width="14" height="14" rx="2"/>
    <rect x="40" y="38" width="6" height="6" fill="url(#heartGrad)"/>
    <!-- Top-right finder -->
    <rect x="70" y="34" width="14" height="14" rx="2"/>
    <rect x="74" y="38" width="6" height="6" fill="url(#heartGrad)"/>
    <!-- Bottom-left finder -->
    <rect x="36" y="62" width="14" height="14" rx="2"/>
    <rect x="40" y="66" width="6" height="6" fill="url(#heartGrad)"/>

    <!-- Data dots -->
    <rect x="56" y="36" width="3" height="3"/>
    <rect x="62" y="36" width="3" height="3"/>
    <rect x="56" y="42" width="3" height="3"/>
    <rect x="62" y="42" width="3" height="3"/>

    <rect x="56" y="56" width="3" height="3"/>
    <rect x="62" y="56" width="3" height="3"/>
    <rect x="68" y="56" width="3" height="3"/>
    <rect x="74" y="56" width="3" height="3"/>

    <rect x="56" y="62" width="3" height="3"/>
    <rect x="68" y="62" width="3" height="3"/>
    <rect x="74" y="62" width="3" height="3"/>

    <rect x="56" y="68" width="3" height="3"/>
    <rect x="62" y="68" width="3" height="3"/>
    <rect x="74" y="68" width="3" height="3"/>

    <rect x="62" y="74" width="3" height="3"/>
    <rect x="68" y="74" width="3" height="3"/>
  </g>
</svg>
